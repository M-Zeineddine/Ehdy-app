name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # No npm audit gate yet: the expo CLI/dev chain would fail it.
      # As of 2026-07-14 (--omit=dev): 25 advisories (1 critical, 6 high),
      # all in the expo CLI/dev chain — gated behind the deferred Expo SDK bump.
      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --no-coverage
        env:
          NODE_ENV: test
